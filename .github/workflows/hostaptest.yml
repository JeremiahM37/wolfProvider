name: hostap-uml-tests-testing

# START OF COMMON SECTION
#test

on:
  push:
    branches: [ '*' ] #'master', 'main', 'release/**' ]
  pull_request:
    branches: [ '*' ]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true
# END OF COMMON SECTION

jobs:
  build_wolfprovider:
    uses: ./.github/workflows/build-wolfprovider.yml
    with:
      wolfssl_ref: ${{ matrix.wolfssl_ref }}
      openssl_ref: ${{ matrix.openssl_ref }}
    strategy:
      matrix:
        wolfssl_ref: [ 'master', 'v5.8.0-stable' ]
        openssl_ref: [ 'openssl-3.5.0' ]

  uml-hwsim:
    runs-on: ubuntu-24.04
    needs: build_wolfprovider
    timeout-minutes: 60
    strategy:
      matrix:
        wolfssl_ref: [ 'v5.8.0-stable' ]
        openssl_ref: [ 'openssl-3.5.0' ]
        force_fail: [ 'WOLFPROV_FORCE_FAIL=1', '' ]
    env:
      KVER: "6.6.41"
      KURL: "https://cdn.kernel.org/pub/linux/kernel/v6.x/linux-6.6.41.tar.xz"
    steps:
      - name: Checkout wolfProvider
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Build wolfprovider
        run: |
          OPENSSL_TAG=${{ inputs.openssl_ref }} WOLFSSL_TAG=${{ inputs.wolfssl_ref }} ./scripts/build-wolfprovider.sh --debug

      # ADD: Install ALL dependencies like VM workflow
      - name: Install build deps for UML + tests (COMPLETE SET)
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential git bc kmod python3 python3-pip python3-venv \
            libelf-dev libssl-dev flex bison zlib1g-dev libncurses5-dev \
            libnl-3-dev libnl-genl-3-dev libnl-route-3-dev libdbus-1-dev \
            lcov binutils-dev libpcap-dev libcurl4-openssl-dev libiberty-dev \
            libsqlite3-dev libzstd1 \
            wireless-tools iw \
            bridge-utils tshark python3-pycryptodome
          # Uninstall system cryptography and reinstall with custom OpenSSL (like VM workflow)
          sudo apt-get remove -y python3-cryptography
          pip install --no-cache-dir --force-reinstall cryptography

      - name: Fetch hostap (if not vendored)
        run: |
          test -d hostap || git clone https://w1.fi/hostap.git

      - name: Cache UML kernel build (entire build tree)
        id: cache-kernel
        uses: actions/cache@v4
        with:
          path: hostap/tests/hwsim/vm/linux-${{ env.KVER }}
          key: uml-${{ runner.os }}-linux-${{ env.KVER }}-cfg-${{ hashFiles('hostap/tests/hwsim/vm/kernel-config.uml') }}
          restore-keys: |
            uml-${{ runner.os }}-linux-${{ env.KVER }}-

      - name: Prepare kernel tree
        if: steps.cache-kernel.outputs.cache-hit != 'true'
        working-directory: hostap/tests/hwsim/vm
        run: |
          curl -L "$KURL" -o "linux-${KVER}.tar.xz"
          tar -xf "linux-${KVER}.tar.xz"

      - name: Build UML kernel (time-travel capable)
        working-directory: hostap/tests/hwsim/vm/linux-${{ env.KVER }}
        run: |
          if [ ! -f .config ] || ! cmp -s ../kernel-config.uml .config; then
            cp ../kernel-config.uml .config
          fi
          ARCH=um make olddefconfig
          ARCH=um make -j"$(nproc)"
          ls -lh vmlinux || true

      # MODIFIED: Use VM workflow's environment setup approach
      - name: Setup environment variables (VM-style approach)
        working-directory: hostap/tests/hwsim
        run: |
          # Create provider.conf in workspace
          cat > "$GITHUB_WORKSPACE/provider.conf" << 'EOF'
          openssl_conf = openssl_init
          
          [openssl_init]
          providers = provider_section
          
          [provider_section]
          libwolfprov = libwolfprov_section
          default = default_section
          
          [libwolfprov_section]
          activate = 1
          
          [default_section]
          activate = 1
          EOF
          
          # Update config files like VM workflow
          cat << EOF >> example-hostapd.config
            # Custom OpenSSL installation paths
            CFLAGS += -I$GITHUB_WORKSPACE/openssl-install/include
            LDFLAGS += -L$GITHUB_WORKSPACE/openssl-install/lib64
            # Override OpenSSL libraries to use custom installation with rpath
            LIBS += -L$GITHUB_WORKSPACE/openssl-install/lib64 -Wl,-rpath,$GITHUB_WORKSPACE/openssl-install/lib64
          EOF
          cat << EOF >> example-wpa_supplicant.config
            # Custom OpenSSL installation paths
            CFLAGS += -I$GITHUB_WORKSPACE/openssl-install/include
            LDFLAGS += -L$GITHUB_WORKSPACE/openssl-install/lib64
            # Override OpenSSL libraries to use custom installation with rpath
            LIBS += -L$GITHUB_WORKSPACE/openssl-install/lib64 -Wl,-rpath,$GITHUB_WORKSPACE/openssl-install/lib64
          EOF

      # MODIFIED: Setup inside.sh like VM workflow
      - name: Setup non-WPFF environment
        working-directory: hostap/tests/hwsim
        if: matrix.force_fail == ''
        run: |
          sed -i '115r /dev/stdin' vm/inside.sh << EOF
            echo "setting env variables"
            echo "Setting up wolfSSL environment in UML mode"
            export LD_LIBRARY_PATH="$GITHUB_WORKSPACE/openssl-install/lib64:$GITHUB_WORKSPACE/wolfprov-install/lib:\$LD_LIBRARY_PATH"
            export OPENSSL_CONF="$GITHUB_WORKSPACE/provider.conf"
            export OPENSSL_MODULES="$GITHUB_WORKSPACE/wolfprov-install/lib"
            export CRYPTOGRAPHY_OPENSSL_NO_LEGACY=1
            echo "wolfSSL environment variables set:"
            echo "LD_LIBRARY_PATH: \$LD_LIBRARY_PATH"
            echo "OPENSSL_CONF: \$OPENSSL_CONF"
            echo "OPENSSL_MODULES: \$OPENSSL_MODULES"
            echo "Testing OpenSSL providers:"
            $GITHUB_WORKSPACE/openssl-install/bin/openssl list -providers || true
          EOF

      - name: Setup WPFF environment
        working-directory: hostap/tests/hwsim
        if: matrix.force_fail == 'WOLFPROV_FORCE_FAIL=1'
        run: |
          sed -i '115r /dev/stdin' vm/inside.sh << EOF
            echo "setting env variables"
            echo "Setting up wolfSSL environment in UML mode"
            export LD_LIBRARY_PATH="$GITHUB_WORKSPACE/openssl-install/lib64:$GITHUB_WORKSPACE/wolfprov-install/lib:\$LD_LIBRARY_PATH"
            export OPENSSL_CONF="$GITHUB_WORKSPACE/provider.conf"
            export OPENSSL_MODULES="$GITHUB_WORKSPACE/wolfprov-install/lib"
            export CRYPTOGRAPHY_OPENSSL_NO_LEGACY=1
            export WOLFPROV_FORCE_FAIL=1
            echo "wolfSSL environment variables set:"
            echo "LD_LIBRARY_PATH: \$LD_LIBRARY_PATH"
            echo "OPENSSL_CONF: \$OPENSSL_CONF"
            echo "OPENSSL_MODULES: \$OPENSSL_MODULES"
            echo "Testing OpenSSL providers:"
            $GITHUB_WORKSPACE/openssl-install/bin/openssl list -providers || true
          EOF

      # ADD: Update certs like VM workflow
      - name: Update certs
        working-directory: hostap/tests/hwsim/auth_serv
        run: ./update.sh

      - name: Sanity check
        run: |
          openssl list -providers -verbose || true

      - name: Build hostap test binaries
        working-directory: hostap/tests/hwsim
        run: ./build.sh

      # ADD: Verify binaries like VM workflow
      - name: Verify openssl binaries linked
        working-directory: hostap
        run: |
          ldd hostapd/hostapd | grep ssl || true
          ldd wpa_supplicant/wpa_supplicant | grep ssl || true

      - name: Smoke tests inside UML
        working-directory: hostap/tests/hwsim/vm
        env:
          KERNEL: ${{ github.workspace }}/hostap/tests/hwsim/vm/linux-${{ env.KVER }}/linux
        run: |
          timeout 1m ./vm-run.sh --timeout 600 -- \
            ap_open ap_wpa2_psk p2p_device_discovery || true
          TEST_RESULT=${PIPESTATUS[0]}
          echo "Test result: $TEST_RESULT"

      - name: TLS/EAP pack (will fail if provider blocks TLS)
        working-directory: hostap/tests/hwsim/vm
        env:
          KERNEL: ${{ github.workspace }}/hostap/tests/hwsim/vm/linux-${{ env.KVER }}/linux
        run: |
          timeout 5m ./vm-run.sh --timeout 1200 -- \
            ap_wpa2_eap_tls \
            ap_wpa2_eap_peap_eap_mschapv2 \
            ap_wpa2_eap_ttls_mschapv2 || true
          TEST_RESULT=${PIPESTATUS[0]}
          echo "Test result: $TEST_RESULT"
          $GITHUB_WORKSPACE/.github/scripts/check-workflow-result.sh $TEST_RESULT ${{ matrix.force_fail }} hostap

      - name: Archive logs
        if: always()
        run: |
          mkdir -p artifacts
          cp -a /tmp/hwsim-test-logs/* artifacts/ || true
        continue-on-error: true

      - name: Upload logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: hwsim-logs-${{ matrix.wolfssl_ref }}-${{ matrix.openssl_ref }}-${{ matrix.force_fail }}
          path: artifacts
